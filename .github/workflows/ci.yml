name: ci
on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly fast eval (Mondays 06:00 UTC)
  workflow_dispatch:      # on-demand fast eval

jobs:
  # Existing per-PR gate: build (type-checks via each package's tsc build) + test.
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm -r test

  # Output-quality eval. Live, so it NEVER runs on a pull_request (a
  # nondeterministic call must not block a PR). Runs weekly (schedule) and
  # on-demand (workflow_dispatch), both on the fast subset via Groq. Groq gives
  # cross-family decorrelation (gpt-oss writer, llama verifier); concurrency 1
  # and repeats 1 keep it under Groq rate limits.
  eval-live:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: build-test
    env:
      SONNY_BACKEND: openai
      SONNY_OPENAI_BASE_URL: https://api.groq.com/openai/v1
      SONNY_OPENAI_API_KEY: ${{ secrets.SONNY_OPENAI_API_KEY }}
      SONNY_EVAL_REPEATS: "1"
      SONNY_SPECIALIST_CONCURRENCY: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @sonny/eval run eval -- --subset fast
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: eval-scorecard
          path: eval/.eval-out
